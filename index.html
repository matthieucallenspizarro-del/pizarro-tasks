*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C8102E;--red-dark:#9e0d23;--red-pale:#fff1f3;--red-mid:#fde0e4;
  --ink:#18181b;--ink2:#52525b;--ink3:#a1a1aa;
  --surface:#faf9f7;--card:#fff;--border:#e4e0db;
  --green:#16a34a;--green-pale:#f0fdf4;--amber:#d97706;--amber-pale:#fffbeb;
  --sidebar:234px;--radius:10px;
}
body{font-family:"Offset",Georgia,serif;background:var(--surface);color:var(--ink);min-height:100vh;display:flex;overflow:hidden}
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;z-index:10;overflow-y:auto;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.sb-illustrations{display:flex;align-items:flex-end;justify-content:center;gap:2px;padding:16px 10px 0;min-height:66px}
.sb-illo{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(200,16,46,.22));animation:floatIllo 3s ease-in-out infinite}
.sb-illo:nth-child(2){animation-delay:.8s;width:48px;height:48px}
.sb-illo:nth-child(3){animation-delay:1.6s;width:42px;height:42px}
@keyframes floatIllo{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.sb-wordmark{display:flex;align-items:center;justify-content:center;padding:10px 18px 0}
.sb-wordmark img{width:148px;mix-blend-mode:screen;display:block}
.sb-tagline{text-align:center;font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.2);font-family:"Hawkins",serif;padding:4px 0 12px;border-bottom:1px solid rgba(255,255,255,.07);margin:0 16px}
.sb-section{padding:14px 16px 5px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.22);font-family:"Hawkins",serif}
.sb-item{display:flex;align-items:center;gap:9px;margin:1px 8px;padding:8px 11px;border-radius:7px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.58);transition:all .14s;border:1px solid transparent;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9)}
.sb-item.active{background:rgba(200,16,46,.18);color:#fff;border-color:rgba(200,16,46,.32)}
.sb-item .proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-item .badge{margin-left:auto;background:rgba(255,255,255,.1);border-radius:20px;padding:1px 6px;font-size:10px;color:rgba(255,255,255,.38)}
.sb-item.warn-badge .badge{background:rgba(217,119,6,.28);color:#fbbf24}
.sb-item .del-proj{display:none;width:16px;height:16px;border-radius:4px;border:none;background:transparent;cursor:pointer;color:rgba(255,255,255,.3);font-size:14px;line-height:1;padding:0;flex-shrink:0;transition:all .14s;margin-left:2px;align-items:center;justify-content:center}
.sb-item:hover .del-proj{display:inline-flex}
.sb-item .del-proj:hover{color:var(--red);background:rgba(200,16,46,.25)}
.sb-add-proj{display:flex;align-items:center;gap:9px;margin:3px 8px;padding:7px 11px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);border:1px dashed rgba(255,255,255,.1);transition:all .14s}
.sb-add-proj:hover{color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.28)}
.sb-subcat{margin:5px 8px 2px}
.sb-subcat-head{display:flex;align-items:center;gap:8px;padding:7px 11px;cursor:pointer;user-select:none;transition:background .14s;border-radius:7px}
.sb-subcat-head:hover{background:rgba(255,255,255,.04)}
.sb-subcat-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.32);font-family:"Hawkins",serif;flex:1}
.sb-subcat-toggle{color:rgba(255,255,255,.25);transition:transform .18s;font-size:8px;line-height:1}
.sb-subcat-toggle.closed{transform:rotate(-90deg)}
.sb-subcat-members{padding:0 0 4px 16px}
.sb-member{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px}
.sb-member .nm{font-size:11px;color:rgba(255,255,255,.45)}
.sb-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-manage-btn{width:100%;padding:7px 11px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:7px;cursor:pointer;font-family:"Offset",serif;font-size:11px;color:rgba(255,255,255,.38);display:flex;align-items:center;gap:8px;transition:all .14s}
.sb-manage-btn:hover{border-color:rgba(255,255,255,.28);color:rgba(255,255,255,.65)}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0;font-family:"Hawkins",serif}
.av.lg{width:30px;height:30px;font-size:11px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;gap:13px;flex-shrink:0}
.tb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tb-title{font-family:"Hawkins",serif;font-size:16px;letter-spacing:.05em;color:var(--ink)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-label{font-size:10px;color:var(--ink3)}
.setup-banner{background:#eff6ff;border-bottom:2px solid #2563eb;padding:10px 28px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.setup-banner.hidden{display:none}
.setup-banner-text{font-size:12px;color:#1e40af;white-space:nowrap}
.setup-url-input{flex:1;max-width:460px;padding:7px 11px;border:1px solid #93c5fd;border-radius:7px;font-family:"Offset",serif;font-size:12px;outline:none;color:var(--ink)}
.setup-url-input:focus{border-color:#2563eb}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;font-family:"Offset",serif;font-size:12px;cursor:pointer;border:none;transition:all .14s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red-dark)}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-ghost{background:transparent;color:var(--ink2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface);border-color:#bbb}
.btn-sm{padding:5px 10px;font-size:11px}
.alerts-bar{background:var(--amber-pale);border-bottom:1px solid #fde68a;padding:8px 28px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.alerts-bar.hidden{display:none}
.alert-text{font-size:12px;color:#92400e;flex:1}.alert-tasks{font-weight:600}
.alert-dismiss{background:transparent;border:none;cursor:pointer;color:#92400e;font-size:16px;padding:0 4px}
.filter-row{background:var(--card);border-bottom:1px solid var(--border);padding:9px 28px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;border:1px solid var(--border);cursor:pointer;transition:all .14s;background:var(--card);color:var(--ink2);font-family:"Offset",serif}
.chip:hover,.chip.on{background:var(--red-pale);border-color:var(--red);color:var(--red)}
.chip.amber-chip:hover,.chip.amber-chip.on{background:var(--amber-pale);border-color:var(--amber);color:var(--amber)}
.search-wrap{margin-left:auto;position:relative}
.search-wrap input{padding:6px 12px 6px 28px;border:1px solid var(--border);border-radius:20px;font-family:"Offset",serif;font-size:12px;outline:none;background:var(--surface);width:185px;transition:all .2s;color:var(--ink)}
.search-wrap input:focus{border-color:var(--red);background:#fff;width:215px}
.search-wrap .ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
.board{flex:1;overflow-y:auto;padding:20px 28px 40px}
.section{margin-bottom:24px}
.sec-head{display:flex;align-items:center;gap:9px;margin-bottom:7px;cursor:pointer;user-select:none}
.sec-toggle{width:15px;height:15px;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:transform .18s}
.sec-toggle.closed{transform:rotate(-90deg)}
.sec-name{font-family:"Hawkins",serif;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
.sec-count{font-size:10.5px;color:var(--ink3);background:var(--border);border-radius:10px;padding:1px 7px}
.task-tbl{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.task-tbl thead tr{background:#f5f2ee;border-bottom:1px solid var(--border)}
.task-tbl th{padding:7px 11px;text-align:left;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);font-weight:normal;font-family:"Hawkins",serif}
.task-tbl th:first-child{padding-left:13px;width:34px}
.task-row{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:#fdf9f5}
.task-row.is-done{opacity:.5}
.task-row td{padding:10px 11px;vertical-align:middle;font-size:13px}
.task-row td:first-child{padding-left:13px}
.task-row.overdue-row{background:#fff8f8}.task-row.overdue-row:hover{background:#fff1f1}
.task-row.soon-row{background:#fffdf5}.task-row.soon-row:hover{background:#fffbee}
.ck{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;background:#fff;flex-shrink:0}
.ck:hover{border-color:var(--red)}.ck.done{background:var(--green);border-color:var(--green)}
.ck.done::after{content:"\2713";font-size:9px;color:#fff}
.st{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:12px;font-size:10px;font-family:"Offset",serif;white-space:nowrap}
.st .d{width:5px;height:5px;border-radius:50%;background:currentColor}
.st.ip{background:var(--amber-pale);color:var(--amber);border:1px solid #fde68a}
.st.dn{background:var(--green-pale);color:var(--green);border:1px solid #bbf7d0}
.st.ov{background:var(--red-pale);color:var(--red);border:1px solid var(--red-mid)}
.dl{font-size:11px;color:var(--ink3);white-space:nowrap;display:flex;align-items:center;gap:5px}
.dl.overdue{color:var(--red);font-weight:600}.dl.soon{color:var(--amber);font-weight:500}
.dl-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cd-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:9.5px;margin-left:5px;font-family:"Hawkins",serif}
.cd-pill.ov{background:var(--red-pale);color:var(--red);border:1px solid var(--red-mid)}
.cd-pill.sn{background:var(--amber-pale);color:var(--amber);border:1px solid #fde68a}
.asc{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2)}
.add-row td{padding:6px 13px;background:var(--surface);border-top:1px solid var(--border)}
.add-inline{display:flex;align-items:center;gap:6px;color:var(--ink3);font-size:11.5px;cursor:pointer;padding:3px 0;transition:color .14s}
.add-inline:hover{color:var(--red)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.46);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:14px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:28px;transform:translateY(10px);transition:transform .2s;box-shadow:0 24px 70px rgba(0,0,0,.18)}
.overlay.open .modal{transform:translateY(0)}
.mo-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mo-title{font-family:"Hawkins",serif;font-size:16px;letter-spacing:.05em}
.mo-close{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all .14s}
.mo-close:hover{background:var(--red-pale);color:var(--red);border-color:var(--red)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;font-family:"Hawkins",serif}
.fi,.fs,.ft{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-family:"Offset",serif;font-size:13px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .14s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--red);background:#fff}
.ft{resize:vertical;min-height:76px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mo-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.detail{position:fixed;top:0;right:-460px;width:430px;height:100vh;background:#fff;border-left:1px solid var(--border);z-index:150;transition:right .24s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:26px 24px;box-shadow:-6px 0 36px rgba(0,0,0,.07)}
.detail.open{right:0}
.det-close{position:absolute;top:17px;right:17px;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all .14s}
.det-close:hover{background:var(--red-pale);color:var(--red)}
.det-name{font-family:"Hawkins",serif;font-size:18px;color:var(--ink);margin:6px 0 16px;padding-right:34px;line-height:1.3}
.det-field{display:flex;align-items:flex-start;gap:11px;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--border)}
.det-field:last-child{border-bottom:none}
.det-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-family:"Hawkins",serif;width:76px;flex-shrink:0;padding-top:2px}
.det-val{font-size:12.5px;color:var(--ink);flex:1}
.det-desc{margin-top:16px}
.det-desc-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-family:"Hawkins",serif;margin-bottom:7px}
.det-desc-txt{font-size:12.5px;color:var(--ink);line-height:1.65;background:var(--surface);border-radius:7px;padding:13px;border:1px solid var(--border)}
.det-actions{display:flex;gap:8px;margin-top:16px}
.dl-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:20px;font-size:11px}
.dl-badge.normal{background:var(--surface);border:1px solid var(--border);color:var(--ink2)}
.dl-badge.overdue{background:var(--red-pale);border:1px solid var(--red-mid);color:var(--red)}
.dl-badge.soon{background:var(--amber-pale);border:1px solid #fde68a;color:var(--amber)}
.mem-row{display:flex;align-items:center;gap:11px;padding:9px 13px;background:var(--surface);border-radius:7px;border:1px solid var(--border);margin-bottom:7px}
.mem-row .nm{flex:1;font-size:13px}
.mem-row .mem-cat{font-size:10px;color:var(--ink3);background:var(--border);border-radius:4px;padding:2px 7px}
.rem-btn{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:#bbb;display:flex;align-items:center;justify-content:center;transition:all .14s;font-size:15px}
.rem-btn:hover{color:var(--red);background:var(--red-pale)}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.csw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .14s}
.csw:hover{transform:scale(1.15)}.csw.sel{border-color:var(--ink);transform:scale(1.15)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;padding:9px 17px;border-radius:8px;font-size:12px;font-family:"Offset",serif;opacity:0;transition:all .22s;z-index:400;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:34px 20px;color:var(--ink3)}.empty p{font-size:12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.task-row{animation:fadeUp .18s ease both}
</style>
</head>

      <svg class="ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="srch" type="text" placeholder="Search tasks...">
    </div>
  </div>
  <div class="board" id="board"></div>
</div>

<div class="detail" id="detail">
  <button class="det-close" id="btn-close-detail"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  <div id="det-body"></div>
</div>

<div class="overlay" id="task-modal">
  <div class="modal">
    <div class="mo-head"><h2 class="mo-title" id="task-mo-title">New Task</h2><button class="mo-close" id="btn-close-task-modal"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="fg"><label class="fl">Task Name *</label><input class="fi" id="t-name" placeholder="What needs to be done?"></div>
    <div class="fg"><label class="fl">Description / Instructions</label><textarea class="ft" id="t-desc" placeholder="Add context, steps, links..."></textarea></div>
    <div class="frow">
      <div class="fg"><label class="fl">Status</label><select class="fs" id="t-status"><option value="in-progress">In Progress</option><option value="done">Done</option></select></div>
      <div class="fg"><label class="fl">Deadline</label><input class="fi" type="date" id="t-deadline"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Assign To</label><select class="fs" id="t-assignee"></select></div>
      <div class="fg"><label class="fl">Project</label><select class="fs" id="t-project"></select></div>
    </div>
    <div class="mo-foot"><button class="btn btn-ghost" id="btn-cancel-task">Cancel</button><button class="btn btn-red" id="btn-save-task">Save Task</button></div>
  </div>
</div>

<div class="overlay" id="proj-modal">
  <div class="modal" style="max-width:360px">
    <div class="mo-head"><h2 class="mo-title">New Project</h2><button class="mo-close" id="btn-close-proj-modal"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="fg"><label class="fl">Project Name *</label><input class="fi" id="p-name" placeholder="e.g. Knokke Launch"></div>
    <div class="fg"><label class="fl">Color</label><div class="color-row" id="color-picker"></div></div>
    <div class="mo-foot"><button class="btn btn-ghost" id="btn-cancel-proj">Cancel</button><button class="btn btn-red" id="btn-save-proj">Create Project</button></div>
  </div>
</div>

<div class="overlay" id="mem-modal">
  <div class="modal" style="max-width:440px">
    <div class="mo-head"><h2 class="mo-title">Team Members</h2><button class="mo-close" id="btn-close-mem-modal"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div id="mem-list" style="margin-bottom:14px"></div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <label class="fl">Add New Member</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;margin-top:5px">
        <input class="fi" id="new-mem" placeholder="Full name...">
        <input class="fi" id="new-mem-email" placeholder="Email address..." type="email">
        <select class="fs" id="new-mem-cat"><option value="overhead">Overhead Mgmt</option><option value="store">Store Mgmt</option></select>
        <button class="btn btn-red" id="btn-add-member">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
var SHEET_URL = localStorage.getItem("pizarro_sheet_url") || "";
var PALETTE = ["#C8102E","#2563eb","#16a34a","#d97706","#7c3aed","#0891b2","#be185d","#ea580c","#0d9488","#4f46e5"];
var selColor = PALETTE[0];

var members  = [];
var projects = [];
var tasks    = [];
var activeProjId = 0;
var activeFilter = "all";
var searchQ  = "";
var editTaskId = null;

// ── API: all calls via GET + URL params (CORS-safe for Apps Script) ───
function api(action, params) {
  if (!SHEET_URL) return Promise.reject("No URL");
  setSyncStatus("syncing", "Syncing...");
  var url = SHEET_URL + "?action=" + action;
  if (params) {
    Object.keys(params).forEach(function(k) {
      url += "&" + k + "=" + encodeURIComponent(params[k] !== undefined ? params[k] : "");
    });
  }
  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) { setSyncStatus("ok", "Synced"); return d; })
    .catch(function(e) { setSyncStatus("err", "Offline"); throw e; });
}

function setSyncStatus(state, label) {
  var dot = document.getElementById("sync-dot");
  var lbl = document.getElementById("sync-label");
  dot.className = "sync-dot " + state;
  lbl.textContent = label;
}

// ── LOCAL CACHE ───────────────────────────────────────────────────────
function saveCache() {
  try { localStorage.setItem("pizarro_cache", JSON.stringify({tasks:tasks,projects:projects,members:members})); } catch(e) {}
}
function loadCache() {
  try { var c = localStorage.getItem("pizarro_cache"); if (c) { var d=JSON.parse(c); tasks=d.tasks||[]; projects=d.projects||[]; members=d.members||[]; return true; } } catch(e) {}
  return false;
}

// ── LOAD ALL DATA ─────────────────────────────────────────────────────
function loadAll() {
  if (!SHEET_URL) {
    if (!loadCache()) {
      projects = [{id:0,name:"Shared Tasks",color:"#C8102E"},{id:1,name:"Personal — Matthieu",color:"#2563eb"},{id:2,name:"Personal — Dimitri",color:"#16a34a"}];
      members  = [{id:"M",name:"Matthieu",color:"#C8102E",cat:"overhead"},{id:"D",name:"Dimitri",color:"#2563eb",cat:"overhead"}];
      tasks    = [];
    }
    setSyncStatus("err", "Not connected");
    afterLoad(); return;
  }
  setSyncStatus("syncing", "Loading...");
  Promise.all([api("getProjects"), api("getMembers"), api("getTasks")])
    .then(function(res) {
      if (res[0].projects && res[0].projects.length) projects = res[0].projects;
      if (res[1].members  && res[1].members.length)  members  = res[1].members;
      if (res[2].tasks)                               tasks    = res[2].tasks;
      saveCache(); afterLoad();
    })
    .catch(function() { loadCache(); afterLoad(); });
}

function afterLoad() {
  if (!getProject(activeProjId) && projects.length) activeProjId = projects[0].id;
  var p = getProject(activeProjId) || projects[0];
  if (p) { document.getElementById("tb-title").textContent = p.name; document.getElementById("tb-dot").style.background = p.color; }
  renderSidebar(); renderBoard(); checkAlerts();
}

// ── HELPERS ───────────────────────────────────────────────────────────
function getMember(id) { return members.find(function(m){return String(m.id)===String(id);})||null; }
function getProject(id) { return projects.find(function(p){return String(p.id)===String(id);})||null; }
function initials(n) { return n.split(" ").map(function(w){return w[0]||"";}).join("").substring(0,2).toUpperCase(); }
var today = new Date(); today.setHours(0,0,0,0);
function daysUntil(ds) { if(!ds) return null; var d=new Date(ds); d.setHours(0,0,0,0); return Math.round((d-today)/86400000); }
function fmtDate(ds) { if(!ds) return ""; var p=ds.split("-"),mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return mo[parseInt(p[1])-1]+" "+parseInt(p[2])+", "+p[0]; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function showToast(msg) { var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},2200); }

function checkAlerts() {
  var ov=[],sn=[];
  tasks.forEach(function(t){if(t.status==="done")return;var d=daysUntil(t.deadline);if(d===null)return;if(d<0)ov.push(t);else if(d<=3)sn.push(t);});
  var parts=[];
  if(ov.length) parts.push("<span class='alert-tasks'>"+ov.length+" overdue task"+(ov.length>1?"s":"")+"</span>");
  if(sn.length) parts.push("<span class='alert-tasks'>"+sn.length+" due within 3 days</span>");
  var bar=document.getElementById("alerts-bar");
  if(parts.length){document.getElementById("alert-text").innerHTML="Deadline alert — "+parts.join(" · ")+" need attention.";bar.classList.remove("hidden");}
  else bar.classList.add("hidden");
}

// ── SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  var ph="";
  projects.forEach(function(p){
    var cnt=tasks.filter(function(t){return String(t.proj)===String(p.id)&&t.status!=="done";}).length;
    var warn=tasks.filter(function(t){if(String(t.proj)!==String(p.id)||t.status==="done")return false;var d=daysUntil(t.deadline);return d!==null&&d<=3;}).length;
    delBtn='<button class="del-proj" data-action="delete-proj" data-proj="'+p.id+'" title="Delete project">&#215;</button>';
    ph+='<div class="sb-item'+(String(p.id)===String(activeProjId)?" active":"")+(warn?" warn-badge":"")+'" data-action="switch-proj" data-proj="'+p.id+'">'
      +'<span class="proj-dot" style="background:'+p.color+'"></span>'+esc(p.name)
      +'<span class="badge">'+(warn?"&#9888; ":"")+cnt+'</span>'+delBtn+'</div>';
  });
  document.getElementById("sb-projects").innerHTML=ph;
  ["overhead","store"].forEach(function(cat){
    var mems=members.filter(function(m){return m.cat===cat;});
    var el=document.getElementById("members-"+cat); if(!el) return;
    el.innerHTML=!mems.length
      ? '<div style="padding:5px 8px 5px 4px;font-size:10.5px;color:rgba(255,255,255,.22);font-style:italic">No members yet</div>'
      : mems.map(function(m){return '<div class="sb-member"><div class="av" style="background:'+m.color+'">'+initials(m.name)+'</div><span class="nm">'+esc(m.name)+'</span></div>';}).join("");
  });
}

function toggleSubcat(cat) {
  var el=document.getElementById("members-"+cat), tog=document.getElementById("tog-"+cat);
  var hidden=el.style.display==="none"; el.style.display=hidden?"":"none"; tog.classList.toggle("closed",!hidden);
}

function switchProject(id) {
  activeProjId=id; var p=getProject(id); if(!p) return;
  document.getElementById("tb-title").textContent=p.name;
  document.getElementById("tb-dot").style.background=p.color;
  document.getElementById("srch").value=""; searchQ="";
  renderBoard(); renderSidebar(); checkAlerts();
}

function setFilter(val) {
  activeFilter=val;
  document.querySelectorAll(".chip").forEach(function(c){c.classList.toggle("on",c.dataset.filter===val);});
  renderBoard();
}

// ── BOARD ─────────────────────────────────────────────────────────────
function renderBoard() {
  var filtered=tasks.filter(function(t){
    if(String(t.proj)!==String(activeProjId)) return false;
    if(activeFilter==="in-progress"&&t.status!=="in-progress") return false;
    if(activeFilter==="done"&&t.status!=="done") return false;
    if(activeFilter==="overdue"){var d=daysUntil(t.deadline);if(t.status==="done"||d===null||d>3)return false;}
    if(searchQ&&String(t.name).toLowerCase().indexOf(searchQ)===-1) return false;
    return true;
  });
  var ip=filtered.filter(function(t){return t.status==="in-progress";});
  var dn=filtered.filter(function(t){return t.status==="done";});
  document.getElementById("board").innerHTML=renderSection("In Progress",ip,"ip")+renderSection("Completed",dn,"dn");
}

function renderSection(label,items,sid){
  var rows=items.length
    ? items.map(function(t){return renderRow(t);}).join("")
    : '<tr><td colspan="5"><div class="empty"><p style="font-size:28px;opacity:.3;margin-bottom:6px">&#10003;</p><p>No tasks here</p></div></td></tr>';
  return '<div class="section">'
    +'<div class="sec-head" data-action="toggle-sec" data-sid="'+sid+'">'
    +'<div class="sec-toggle" id="tog-sec-'+sid+'"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>'
    +'<span class="sec-name">'+label+'</span><span class="sec-count">'+items.length+'</span></div>'
    +'<table class="task-tbl" id="tbl-'+sid+'">'
    +'<thead><tr><th></th><th>Task</th><th style="width:126px">Assignee</th><th style="width:128px">Deadline</th><th style="width:116px">Status</th></tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'<tr class="add-row"><td colspan="5"><div class="add-inline" data-action="add-task">'
    +'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    +'Add task</div></td></tr></table></div>';
}

function renderRow(t){
  var m=getMember(t.assignee), mn=m?m.name:"Unassigned", mc=m?m.color:"#aaa", mi=m?initials(m.name):"?";
  var d=daysUntil(t.deadline), isOv=t.status!=="done"&&d!==null&&d<0, isSn=t.status!=="done"&&d!==null&&d>=0&&d<=3;
  var cdPill=isOv?'<span class="cd-pill ov">'+Math.abs(d)+'d overdue</span>':(isSn?'<span class="cd-pill sn">'+(d===0?"today":d+"d")+'</span>':"");
  var stBadge=t.status==="done"?'<span class="st dn"><span class="d"></span>Done</span>'
    :(isOv?'<span class="st ov"><span class="d"></span>Overdue</span>'
          :'<span class="st ip"><span class="d"></span>In Progress</span>');
  var descIco=t.desc?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" style="margin-left:5px;flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>':"";
  return '<tr class="task-row'+(t.status==="done"?" is-done":"")+(isOv?" overdue-row":"")+(isSn&&!isOv?" soon-row":"")+'" data-action="open-detail" data-id="'+t.id+'">'
    +'<td><div class="ck'+(t.status==="done"?" done":"")+'" data-action="toggle-done" data-id="'+t.id+'"></div></td>'
    +'<td><div style="display:flex;align-items:center">'+esc(t.name)+descIco+'</div></td>'
    +'<td><div class="asc"><div class="av" style="background:'+mc+';width:22px;height:22px;font-size:9px">'+mi+'</div>'+esc(mn)+'</div></td>'
    +'<td><div class="dl '+(isOv?"overdue":isSn?"soon":"")+'">'
    +'<span class="dl-dot" style="background:'+(isOv?"var(--red)":isSn?"var(--amber)":"var(--border)")+'"></span>'
    +(t.deadline?fmtDate(t.deadline):"&#8212;")+cdPill+'</div></td>'
    +'<td>'+stBadge+'</td></tr>';
}

// ── DETAIL ────────────────────────────────────────────────────────────
function openDetail(id){
  var t=tasks.find(function(x){return String(x.id)===String(id);}); if(!t) return;
  var m=getMember(t.assignee), p=getProject(t.proj);
  var d=daysUntil(t.deadline), isOv=t.status!=="done"&&d!==null&&d<0, isSn=t.status!=="done"&&d!==null&&d>=0&&d<=3;
  var dlBadge='<span class="dl-badge '+(isOv?"overdue":isSn?"soon":"normal")+'">'
    +(isOv?"&#9888; ":isSn?"&#9200; ":"")+(t.deadline?fmtDate(t.deadline):"No deadline")
    +(isOv?" ("+Math.abs(d)+"d overdue)":isSn?" ("+(d===0?"today":d+"d away")+")":" ")+'</span>';
  var stBadge=t.status==="done"?'<span class="st dn"><span class="d"></span>Done</span>'
    :(isOv?'<span class="st ov"><span class="d"></span>Overdue</span>'
          :'<span class="st ip"><span class="d"></span>In Progress</span>');
  var html='<div class="det-name">'+esc(t.name)+'</div>'
    +'<div class="det-field"><div class="det-lbl">Status</div><div class="det-val">'+stBadge+'</div></div>'
    +'<div class="det-field"><div class="det-lbl">Project</div><div class="det-val" style="display:flex;align-items:center;gap:7px"><div style="width:7px;height:7px;border-radius:50%;background:'+(p?p.color:"#aaa")+'"></div>'+esc(p?p.name:"")+'</div></div>'
    +'<div class="det-field"><div class="det-lbl">Assignee</div><div class="det-val" style="display:flex;align-items:center;gap:7px">'
    +(m?'<div class="av" style="background:'+m.color+';width:22px;height:22px;font-size:9px">'+initials(m.name)+'</div>'+esc(m.name):"Unassigned")
    +'</div></div>'
    +'<div class="det-field"><div class="det-lbl">Deadline</div><div class="det-val">'+dlBadge+'</div></div>'
    +'<div class="det-actions">'
    +'<button class="btn btn-ghost" style="flex:1;font-size:11.5px" data-action="edit-task" data-id="'+t.id+'">Edit Task</button>'
    +'<button class="btn btn-ghost" style="color:var(--red);border-color:var(--red);font-size:11.5px" data-action="delete-task" data-id="'+t.id+'">Delete</button>'
    +'</div>';
  if(t.desc) html+='<div class="det-desc"><div class="det-desc-lbl">Description</div><div class="det-desc-txt">'+esc(t.desc).replace(/\n/g,"<br>")+'</div></div>';
  document.getElementById("det-body").innerHTML=html;
  document.getElementById("detail").classList.add("open");
}
function closeDetail(){ document.getElementById("detail").classList.remove("open"); }
function deleteTask(id){
  if(!confirm("Delete this task?")) return;
  tasks=tasks.filter(function(t){return String(t.id)!==String(id);});
  api("deleteTask",{id:id}).catch(function(){});
  saveCache(); closeDetail(); renderBoard(); renderSidebar(); checkAlerts(); showToast("Task deleted");
}

// ── TASK MODAL ────────────────────────────────────────────────────────
function populateTaskModal(){
  var asel=document.getElementById("t-assignee"); asel.innerHTML="";
  members.forEach(function(m){var o=document.createElement("option");o.value=m.id;o.textContent=m.name;asel.appendChild(o);});
  var psel=document.getElementById("t-project"); psel.innerHTML="";
  projects.forEach(function(p){var o=document.createElement("option");o.value=p.id;o.textContent=p.name;psel.appendChild(o);});
  psel.value=activeProjId;
}
function openAddTaskModal(){
  editTaskId=null;
  document.getElementById("task-mo-title").textContent="New Task";
  ["t-name","t-desc"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("t-status").value="in-progress";
  document.getElementById("t-deadline").value="";
  populateTaskModal(); document.getElementById("task-modal").classList.add("open");
}
function openEditModal(id){
  var t=tasks.find(function(x){return String(x.id)===String(id);}); if(!t) return;
  editTaskId=id;
  document.getElementById("task-mo-title").textContent="Edit Task";
  document.getElementById("t-name").value=t.name;
  document.getElementById("t-desc").value=t.desc||"";
  document.getElementById("t-status").value=t.status;
  document.getElementById("t-deadline").value=t.deadline||"";
  populateTaskModal();
  document.getElementById("t-assignee").value=t.assignee||"";
  document.getElementById("t-project").value=t.proj;
  document.getElementById("task-modal").classList.add("open");
}
function closeTaskModal(){ document.getElementById("task-modal").classList.remove("open"); }
function saveTask(){
  var name=document.getElementById("t-name").value.trim();
  if(!name){ showToast("Please enter a task name"); return; }
  var data={
    name:name, desc:document.getElementById("t-desc").value.trim(),
    status:document.getElementById("t-status").value,
    deadline:document.getElementById("t-deadline").value,
    assignee:document.getElementById("t-assignee").value,
    proj:document.getElementById("t-project").value
  };
  if(editTaskId!==null){
    data.id=editTaskId;
    for(var i=0;i<tasks.length;i++) if(String(tasks[i].id)===String(editTaskId)){Object.assign(tasks[i],data);break;}
    api("saveTask",data).catch(function(){});
    showToast("Task updated");
  } else {
    data.id=String(Date.now());
    tasks.push(data);
    api("saveTask",data).then(function(res){if(res&&res.id)data.id=res.id;saveCache();}).catch(function(){});
    showToast("Task added!");
  }
  saveCache(); closeTaskModal();
  if(String(data.proj)!==String(activeProjId)) switchProject(data.proj);
  else { renderBoard(); renderSidebar(); checkAlerts(); }
}

// ── PROJECT MODAL ─────────────────────────────────────────────────────
function openNewProjectModal(){ selColor=PALETTE[0]; document.getElementById("p-name").value=""; renderColorPicker(); document.getElementById("proj-modal").classList.add("open"); }
function closeProjModal(){ document.getElementById("proj-modal").classList.remove("open"); }
function renderColorPicker(){
  document.getElementById("color-picker").innerHTML=PALETTE.map(function(c){
    return '<div class="csw'+(c===selColor?" sel":"")+'" style="background:'+c+'" data-action="pick-color" data-color="'+c+'"></div>';
  }).join("");
}
function saveProject(){
  var name=document.getElementById("p-name").value.trim(); if(!name){showToast("Enter a project name");return;}
  var proj={id:String(Date.now()),name:name,color:selColor};
  projects.push(proj);
  api("saveProject",{name:name,color:selColor}).then(function(res){if(res&&res.id)proj.id=res.id;saveCache();}).catch(function(){});
  saveCache(); closeProjModal(); switchProject(proj.id); showToast("Project created!");
}

// ── MEMBERS MODAL ─────────────────────────────────────────────────────
function openMembersModal(){ renderMemList(); document.getElementById("mem-modal").classList.add("open"); }
function closeMembersModal(){ document.getElementById("mem-modal").classList.remove("open"); }
function renderMemList(){
  var cats={overhead:"Overhead Mgmt",store:"Store Mgmt"}; var html="";
  ["overhead","store"].forEach(function(cat){
    var mems=members.filter(function(m){return m.cat===cat;});
    html+='<div style="font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);font-family:Hawkins,serif;margin:10px 0 6px">'+cats[cat]+'</div>';
    if(!mems.length) html+='<div style="font-size:11.5px;color:var(--ink3);padding:4px 6px;font-style:italic">No members yet</div>';
    mems.forEach(function(m){
      var canRm=m.id!=="M"&&m.id!=="D";
      var emailBadge=m.email?'<span style="font-size:10px;color:var(--ink3);margin-left:4px">'+esc(m.email)+'</span>':'<span style="font-size:10px;color:#ccc;margin-left:4px;font-style:italic">no email</span>';
      html+='<div class="mem-row"><div class="av lg" style="background:'+m.color+'">'+initials(m.name)+'</div>'
        +'<span class="nm">'+esc(m.name)+'</span>'
        +'<span class="mem-cat">'+cats[m.cat]+'</span>'
        +emailBadge
        +'<button class="rem-btn" data-action="edit-member-email" data-id="'+m.id+'" title="Edit email" style="color:#93c5fd;font-size:11px;width:auto;padding:2px 6px;border-radius:4px">✉</button>'
        +(canRm?'<button class="rem-btn" data-action="remove-member" data-id="'+m.id+'">&#215;</button>':"")
        +'</div>';
    });
  });
  document.getElementById("mem-list").innerHTML=html;
}
function addMember(){
  var inp=document.getElementById("new-mem"), name=inp.value.trim(); if(!name) return;
  var cat=document.getElementById("new-mem-cat").value;
  var colors=PALETTE.slice(2);
  var id=name.replace(/\s+/g,"").substring(0,4).toUpperCase()+Date.now();
  var m={id:id,name:name,color:colors[members.length%colors.length],cat:cat};
  members.push(m);
  api("saveMember",m).catch(function(){});
  saveCache(); inp.value=""; renderMemList(); renderSidebar(); showToast(name+" added!");
}

function editMemberEmail(id){
  var m=members.find(function(x){return x.id===id;});
  if(!m) return;
  var email=prompt("Enter email address for "+m.name+":", m.email||"");
  if(email===null) return; // cancelled
  m.email=email.trim();
  api("updateMemberEmail",{id:id,email:m.email}).catch(function(){});
  saveCache();
  renderMemList();
  showToast("Email updated for "+m.name);
}

function removeMember(id){
  members=members.filter(function(m){return m.id!==id;});
  api("deleteMember",{id:id}).catch(function(){});
  saveCache(); renderMemList(); renderSidebar();
}

// ── CONNECT ───────────────────────────────────────────────────────────
function connectSheet(){
  var url=document.getElementById("sheet-url-input").value.trim();
  if(!url||!url.startsWith("https://")){showToast("Enter a valid URL");return;}
  SHEET_URL=url; localStorage.setItem("pizarro_sheet_url",url);
  document.getElementById("setup-banner").classList.add("hidden");
  showToast("Connecting...");
  api("init").then(function(){ loadAll(); }).catch(function(){ loadAll(); });
}

// ── EVENT DELEGATION ──────────────────────────────────────────────────
document.addEventListener("click",function(e){
  var el=e.target;
  while(el&&el!==document.body){
    var a=el.dataset&&el.dataset.action;
    if(a){
      if(a==="switch-proj"){switchProject(el.dataset.proj);return;}
      if(a==="toggle-sec"){var sid=el.dataset.sid,tbl=document.getElementById("tbl-"+sid),tog=document.getElementById("tog-sec-"+sid),h=tbl.style.display==="none";tbl.style.display=h?"":"none";tog.classList.toggle("closed",!h);return;}
      if(a==="open-detail"){openDetail(el.dataset.id);return;}
      if(a==="toggle-done"){e.stopPropagation();var id=el.dataset.id,t=tasks.find(function(x){return String(x.id)===String(id);});if(t){t.status=t.status==="done"?"in-progress":"done";api("saveTask",t).catch(function(){});saveCache();showToast(t.status==="done"?"Task done!":"Task reopened");}renderBoard();renderSidebar();checkAlerts();return;}
      if(a==="add-task"){openAddTaskModal();return;}
      if(a==="edit-task"){openEditModal(el.dataset.id);closeDetail();return;}
      if(a==="delete-task"){deleteTask(el.dataset.id);return;}
      if(a==="pick-color"){selColor=el.dataset.color;renderColorPicker();return;}
      if(a==="delete-proj"){e.stopPropagation();deleteProject(el.dataset.proj);return;}
      if(a==="remove-member"){removeMember(el.dataset.id);return;}
      if(a==="edit-member-email"){editMemberEmail(el.dataset.id);return;}
    }
    el=el.parentElement;
  }
  if(e.target.id==="task-modal")closeTaskModal();
  if(e.target.id==="proj-modal")closeProjModal();
  if(e.target.id==="mem-modal")closeMembersModal();
});

document.getElementById("btn-add-proj").onclick=openNewProjectModal;
document.getElementById("btn-manage-members").onclick=openMembersModal;
document.getElementById("btn-team-top").onclick=openMembersModal;
document.getElementById("btn-add-task-top").onclick=openAddTaskModal;
document.getElementById("btn-close-detail").onclick=closeDetail;
document.getElementById("btn-dismiss-alert").onclick=function(){document.getElementById("alerts-bar").classList.add("hidden");};
document.getElementById("btn-close-task-modal").onclick=closeTaskModal;
document.getElementById("btn-cancel-task").onclick=closeTaskModal;
document.getElementById("btn-save-task").onclick=saveTask;
document.getElementById("btn-close-proj-modal").onclick=closeProjModal;
document.getElementById("btn-cancel-proj").onclick=closeProjModal;
document.getElementById("btn-save-proj").onclick=saveProject;
document.getElementById("btn-close-mem-modal").onclick=closeMembersModal;
document.getElementById("btn-add-member").onclick=addMember;
document.getElementById("btn-connect").onclick=connectSheet;
document.getElementById("subcat-head-overhead").onclick=function(){toggleSubcat("overhead");};
document.getElementById("subcat-head-store").onclick=function(){toggleSubcat("store");};
document.getElementById("srch").oninput=function(){searchQ=this.value.toLowerCase();renderBoard();};
document.getElementById("new-mem").onkeydown=function(e){if(e.key==="Enter")addMember();};
document.getElementById("sheet-url-input").onkeydown=function(e){if(e.key==="Enter")connectSheet();};
document.querySelectorAll(".chip").forEach(function(c){c.onclick=function(){setFilter(c.dataset.filter);};});
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){closeTaskModal();closeProjModal();closeMembersModal();closeDetail();}
  if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();document.getElementById("srch").focus();}
});

// ── INIT ──────────────────────────────────────────────────────────────
if(SHEET_URL) document.getElementById("setup-banner").classList.add("hidden");
loadAll();
setInterval(function(){ if(SHEET_URL) loadAll(); }, 60000);
</script>
